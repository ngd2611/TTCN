<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang 12 - Form Lập Yêu cầu xuất kho - He thong quan ly kho Truong Tho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body class="flex h-screen text-slate-800 overflow-hidden">
    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Page Content -->
        <div class="flex-1 overflow-y-auto p-6 bg-[#F4F7F9]">
            <button data-nav="exportRequestList" class="w-10 h-10 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-blue-600 hover:border-blue-300 shadow-sm flex items-center justify-center transition-all">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Lập Yêu cầu xuất kho</h2>
                    <p class="text-sm text-slate-500 mt-1">Vui lòng nhập đầy đủ thông tin khách hàng và danh sách vật tư cần xuất.</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-6">
                <!-- Cột trái: Thông tin chung -->
                <div class="col-span-1 space-y-6">
                    <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                        <h3 class="text-base font-bold text-slate-800 mb-5 border-b pb-3">Thông tin chung</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Mã yêu cầu</label>
                                <input type="text" value="YCX-202605-005" disabled class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-500 cursor-not-allowed">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Khách hàng / Công trình <span class="text-red-500">*</span></label>
                                <select class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:border-blue-500 outline-none">
                                    <option>-- Chọn khách hàng --</option>
                                    <option>Đại lý Daiichi Hạ Long</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Lý do xuất <span class="text-red-500">*</span></label>
                                <textarea rows="3" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:border-blue-500 outline-none resize-none" placeholder="Nhập mục đích xuất hàng..."></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ngày lập</label>
                                <input type="text" id="ngay-lap" readonly class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-500 cursor-not-allowed">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ngày dự kiến nhận <span class="text-red-500">*</span></label>
                                <input type="date" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:border-blue-500 outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Cột phải: Danh sách vật tư -->
                <div class="col-span-2">
                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden text-sm">
                        <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                            <h3 class="font-bold text-slate-800 uppercase text-xs">Danh sách vật tư yêu cầu</h3>
                            <button class="text-blue-600 font-semibold hover:underline"><i class="fas fa-plus mr-1"></i> Thêm vật tư</button>
                        </div>
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-white border-b border-slate-100">
                                    <th class="p-4 font-semibold text-slate-600">Mã VT</th>
                                    <th class="p-4 font-semibold text-slate-600">Tên vật tư</th>
                                    <th class="p-4 font-semibold text-slate-600 text-center">ĐVT</th>
                                    <th class="p-4 font-semibold text-slate-600 text-center w-32">Số lượng</th>
                                    <th class="p-4 text-center">Xóa</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-b border-slate-50">
                                    <td class="p-4 text-blue-600 font-medium">VT001</td>
                                    <td class="p-4">Tấm thạch cao tiêu chuẩn Knauf</td>
                                    <td class="p-4 text-center text-slate-500">Tấm</td>
                                    <td class="p-4"><input type="number" value="100" class="w-full border border-slate-200 rounded px-2 py-1.5 text-center focus:border-blue-500 outline-none"></td>
                                    <td class="p-4 text-center"><button class="text-red-400 hover:text-red-600"><i class="fas fa-times"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="p-6 bg-slate-50 border-t border-slate-200 flex justify-end space-x-3">
                            <button class="px-6 py-2.5 rounded-lg font-bold text-slate-600 border border-slate-300 bg-white hover:bg-slate-50 transition-colors">Hủy bỏ</button>
                            <button class="px-8 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-200 transition-all"><i class="fas fa-paper-plane mr-2"></i> Lưu & Gửi yêu cầu</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Load Core Scripts -->
    <script src="../../assets/js/mock_data.js"></script>
    <script src="../../assets/js/navigation.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        document.getElementById('ngay-lap').value = todayDisplay();
    </script>
</body>
</html>
