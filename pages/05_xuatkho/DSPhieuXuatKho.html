<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Phiếu xuất kho - Hệ thống quản lý kho Trường Thọ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F4F7F9; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-[#F4F7F9] text-slate-800">

    <!-- Page Content -->
    <div class="p-6">
        <!-- Submenu Tabs -->
        <div class="mb-5 border-b border-slate-200">
            <nav class="flex space-x-1">
                <a href="DSPhieuXuatKho.html" class="px-4 py-2.5 text-sm font-semibold text-blue-600 border-b-2 border-blue-600">
                    <i class="fas fa-list mr-2"></i>Danh sách phiếu xuất
                </a>
                <a href="DSYeuCauXuatKho.html" class="px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent hover:border-slate-300 transition-colors">
                    <i class="fas fa-file-alt mr-2"></i>Yêu cầu xuất kho
                </a>
                <a href="TraCuuTonKho.html" class="px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent hover:border-slate-300 transition-colors">
                    <i class="fas fa-search mr-2"></i>Tra cứu tồn kho
                </a>
            </nav>
        </div>

        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Danh sách Phiếu xuất kho</h2>
                <p class="text-sm text-slate-500 mt-1">Quản lý các phiếu xuất kho đã được tạo và trạng thái lấy hàng.</p>
            </div>
            <div class="flex space-x-3">
                <button class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-lg text-sm font-medium flex items-center shadow-sm transition-colors">
                    <i class="fas fa-file-export mr-2 text-slate-400"></i> Xuất Excel
                </button>
                <button class="bg-[#2563EB] hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium flex items-center shadow-sm transition-colors" data-nav="createExport">
                    <i class="fas fa-plus mr-2"></i> Tạo phiếu xuất
                </button>
            </div>
        </div>

        <!-- Khung Lọc -->
        <div class="bg-white border border-slate-200 rounded-t-xl p-4 flex flex-wrap gap-4 items-center">
            <div class="relative w-72">
                <i class="fas fa-search absolute left-3 top-2.5 text-slate-400"></i>
                <input id="f-search" type="text" placeholder="Tìm mã phiếu, mã yêu cầu, người lập..." class="w-full bg-white border border-slate-200 text-sm rounded-lg pl-9 pr-4 py-2 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <div class="relative">
                <select id="f-status" class="border border-slate-200 text-slate-600 text-sm rounded-lg pl-4 pr-10 py-2 focus:outline-none focus:border-blue-500 appearance-none bg-white">
                    <option>Tất cả trạng thái</option>
                    <option>Tạo thành công</option>
                    <option>Đã xuất hàng</option>
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-3 text-slate-400 text-xs pointer-events-none"></i>
            </div>

            <div class="flex items-center space-x-2">
                <input id="f-from" type="date" class="border border-slate-200 text-slate-600 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500 bg-white">
                <span class="text-slate-400">-</span>
                <input id="f-to" type="date" class="border border-slate-200 text-slate-600 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500 bg-white">
                <button id="f-reset" class="text-slate-400 hover:text-blue-600 transition-colors px-1" title="Xóa bộ lọc"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>
        <!-- Counter -->
        <div class="px-4 py-2 bg-white border-x border-slate-200 text-[12px] text-slate-500" id="f-counter"></div>

        <!-- Bảng Dữ liệu -->
        <div class="bg-white border-x border-b border-slate-200 rounded-b-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-y border-slate-200">
                    <tr>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Mã Phiếu Xuất</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Ngày Lập</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Tham chiếu Yêu Cầu</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Người lập phiếu</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">Trạng thái</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100" id="pxk-tbody">
                </tbody>
            </table>
            
            <!-- Pagination -->
            <div class="p-4 flex justify-between items-center">
                <span class="text-sm text-slate-500">Hiển thị 1 - 10 trên tổng 45 phiếu xuất</span>
                <div class="flex space-x-1">
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50 disabled:opacity-50" disabled>Trước</button>
                    <button class="px-3 py-1.5 border border-blue-600 bg-blue-50 rounded-md text-sm text-blue-600 font-medium">1</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">2</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">3</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">Sau</button>
                </div>
            </div>
        </div>

    </div>

    <script src="../../assets/js/mock_data.js"></script>
    <script src="../../assets/js/filter.js"></script>
    <script src="../../assets/js/navigation.js"></script>
    <script>
        (function () {
            const list = JSON.parse(localStorage.getItem('ttcn_phieu_xuat') || '[]');
            const tbody = document.getElementById('pxk-tbody');
            tbody.innerHTML = list.map(p => {
                const badge = p.trangThai === 'thanh_cong'
                    ? `<span class="bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full text-xs font-medium border border-emerald-200"><i class="fas fa-check mr-1"></i> Tạo thành công</span>`
                    : `<span class="bg-slate-100 text-slate-700 px-2.5 py-1 rounded-full text-xs font-medium border border-slate-200"><i class="fas fa-truck-loading mr-1"></i> Đã xuất hàng</span>`;
                return `<tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-sm font-semibold text-blue-600">${p.ma}</td>
                    <td class="p-4 text-sm text-slate-600">${p.ngay}</td>
                    <td class="p-4 text-sm text-slate-600">${p.thamChieu}</td>
                    <td class="p-4 text-sm font-medium text-slate-800">${p.nguoiLap}</td>
                    <td class="p-4 text-center">${badge}</td>
                    <td class="p-4 text-center space-x-2">
                        <button class="w-8 h-8 rounded-lg text-blue-500 hover:bg-blue-50"><i class="fas fa-eye"></i></button>
                        <button class="w-8 h-8 rounded-lg text-slate-400 hover:bg-slate-100"><i class="fas fa-print"></i></button>
                    </td>
                </tr>`;
            }).join('');

            FilterEngine.init({
                tableBodyId: 'pxk-tbody',
                searchId: 'f-search',
                statusId: 'f-status',
                dateFromId: 'f-from',
                dateToId: 'f-to',
                counterId: 'f-counter',
                resetId: 'f-reset',
                searchCols: [0, 2, 3],
                dateCol: 1
            });
        })();
    </script>
</body>
</html>
