<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Chỉnh sửa vật tư - Hệ thống quản lý kho Trường Thọ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body class="flex h-screen text-slate-800 overflow-hidden">
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <div class="flex-1 overflow-y-auto p-6 bg-[#F4F7F9]">

            <!-- Tiêu đề -->
            <div class="mb-6 flex items-center space-x-4">
                <button data-nav="materials" class="w-10 h-10 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-blue-600 hover:border-blue-300 shadow-sm flex items-center justify-center transition-all">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Chỉnh sửa vật tư</h2>
                    <p class="text-sm text-slate-500 mt-1">Cập nhật thông tin chi tiết của vật tư.</p>
                </div>
            </div>

            <!-- Skeleton loader -->
            <div id="skeleton" class="bg-white border border-slate-200 rounded-xl shadow-sm p-8 max-w-5xl animate-pulse">
                <div class="h-5 bg-slate-200 rounded w-48 mb-8"></div>
                <div class="grid grid-cols-2 gap-x-10 gap-y-6">
                    <div class="space-y-5">
                        <div class="h-10 bg-slate-200 rounded"></div>
                        <div class="h-10 bg-slate-200 rounded"></div>
                        <div class="h-10 bg-slate-200 rounded"></div>
                        <div class="h-10 bg-slate-200 rounded"></div>
                    </div>
                    <div class="space-y-5">
                        <div class="h-10 bg-slate-200 rounded"></div>
                        <div class="h-10 bg-slate-200 rounded"></div>
                        <div class="h-10 bg-slate-200 rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Form Card -->
            <div id="form-card" class="hidden bg-white border border-slate-200 rounded-xl shadow-sm p-8 max-w-5xl">

                <h3 class="text-base font-bold text-slate-800 border-b border-slate-100 pb-4 mb-6">
                    <i class="fas fa-pen-to-square text-blue-500 mr-2"></i>
                    Thông tin vật tư &mdash; <span id="label-ma" class="text-blue-600 font-mono"></span>
                </h3>

                <!-- Thông báo lỗi -->
                <div id="form-error" class="hidden mb-5 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 flex items-start gap-2">
                    <i class="fas fa-exclamation-circle mt-0.5 shrink-0"></i>
                    <span id="form-error-msg"></span>
                </div>

                <form id="form-sua-vat-tu" novalidate>
                    <div class="grid grid-cols-2 gap-x-10 gap-y-6">

                        <!-- ── Cột trái ── -->
                        <div class="space-y-5">

                            <!-- Mã vật tư (readonly) -->
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Mã vật tư</label>
                                <input type="text" id="Ma_Vat_Tu" readonly
                                    class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-400 bg-slate-50 cursor-not-allowed font-mono uppercase">
                                <p class="text-xs text-slate-400 mt-1">Mã vật tư không thể thay đổi.</p>
                            </div>

                            <!-- Tên vật tư -->
                            <div>
                                <label for="Ten_Vat_Tu" class="block text-sm font-semibold text-slate-700 mb-2">
                                    Tên vật tư <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="Ten_Vat_Tu" name="Ten_Vat_Tu" required
                                    placeholder="Nhập tên đầy đủ của vật tư..."
                                    class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                            </div>

                            <!-- Nhóm vật tư -->
                            <div>
                                <label for="Ma_Nhom_Vat_Tu" class="block text-sm font-semibold text-slate-700 mb-2">
                                    Nhóm vật tư <span class="text-red-500">*</span>
                                </label>
                                <div class="relative">
                                    <select id="Ma_Nhom_Vat_Tu" name="Ma_Nhom_Vat_Tu" required
                                        class="w-full border border-slate-300 rounded-lg pl-4 pr-10 py-2.5 appearance-none text-sm text-slate-700 bg-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                                        <option value="" disabled>— Đang tải... —</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-4 top-3.5 text-slate-400 text-xs pointer-events-none"></i>
                                </div>
                            </div>

                            <!-- Đơn vị tính -->
                            <div>
                                <label for="Ma_DVT_Co_Ban" class="block text-sm font-semibold text-slate-700 mb-2">
                                    Đơn vị tính cơ bản <span class="text-red-500">*</span>
                                </label>
                                <div class="relative">
                                    <select id="Ma_DVT_Co_Ban" name="Ma_DVT_Co_Ban" required
                                        class="w-full border border-slate-300 rounded-lg pl-4 pr-10 py-2.5 appearance-none text-sm text-slate-700 bg-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                                        <option value="" disabled>— Đang tải... —</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-4 top-3.5 text-slate-400 text-xs pointer-events-none"></i>
                                </div>
                            </div>
                        </div>

                        <!-- ── Cột phải ── -->
                        <div class="space-y-5">

                            <!-- Quy cách & Độ dày -->
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label for="Quy_Cach" class="block text-sm font-semibold text-slate-700 mb-2">Quy cách</label>
                                    <input type="text" id="Quy_Cach" name="Quy_Cach"
                                        placeholder="VD: 1220x2440"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                                </div>
                                <div>
                                    <label for="Do_Day" class="block text-sm font-semibold text-slate-700 mb-2">Độ dày</label>
                                    <input type="text" id="Do_Day" name="Do_Day"
                                        placeholder="VD: 9mm"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                                </div>
                            </div>

                            <!-- Vị trí lưu kho -->
                            <div>
                                <label for="Vi_Tri_Luu_Kho" class="block text-sm font-semibold text-slate-700 mb-2">Vị trí lưu kho</label>
                                <input type="text" id="Vi_Tri_Luu_Kho" name="Vi_Tri_Luu_Kho"
                                    placeholder="VD: Kệ A1"
                                    class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                            </div>

                            <!-- Định mức tồn -->
                            <div>
                                <label for="Dinh_Muc_Ton" class="block text-sm font-semibold text-slate-700 mb-2">Định mức tồn tối thiểu</label>
                                <input type="number" id="Dinh_Muc_Ton" name="Dinh_Muc_Ton" min="0" value="0"
                                    class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                                <p class="text-xs text-slate-400 mt-1">Hệ thống sẽ cảnh báo khi tồn kho xuống dưới mức này.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Nút hành động -->
                    <div class="mt-10 pt-6 border-t border-slate-100 flex justify-end space-x-3">
                        <button type="button" data-nav="materials"
                            class="px-6 py-2.5 rounded-lg text-sm font-semibold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 transition-colors">
                            Hủy bỏ
                        </button>
                        <button type="submit" id="btn-submit"
                            class="px-6 py-2.5 rounded-lg text-sm font-semibold text-white bg-[#2563EB] hover:bg-blue-700 shadow-sm transition-colors flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                            <i id="btn-icon" class="fas fa-save"></i>
                            <span id="btn-text">Lưu thay đổi</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Trạng thái lỗi load trang -->
            <div id="load-error" class="hidden bg-white border border-slate-200 rounded-xl shadow-sm p-12 max-w-5xl text-center">
                <i class="fas fa-exclamation-circle text-4xl text-red-400 mb-4"></i>
                <p class="text-slate-600 font-medium" id="load-error-msg">Không tìm thấy vật tư.</p>
                <button data-nav="materials" class="mt-4 px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                    Quay lại danh sách
                </button>
            </div>

        </div>
    </main>

    <script src="../../assets/js/navigation.js?v=3"></script>

    <script>
        const API_URL = window.location.origin.includes('localhost')
            ? 'http://localhost/TTCN/backend/controllers/VatTuController.php'
            : window.location.origin + '/TTCN/backend/controllers/VatTuController.php';

        // Lấy mã vật tư từ query string (?ma=VT001)
        const maVatTu = new URLSearchParams(window.location.search).get('ma');

        // ── Khởi tạo: load dropdown + data vật tư song song ─────────────────
        async function init() {
            if (!maVatTu) {
                showLoadError('URL thiếu tham số mã vật tư.');
                return;
            }

            try {
                const ts = Date.now();
                const [resNhom, resDvt, resVatTu] = await Promise.all([
                    fetch(API_URL + '?action=get_nhom&t=' + ts, { cache: 'no-store' }),
                    fetch(API_URL + '?action=get_dvt&t='  + ts, { cache: 'no-store' }),
                    fetch(API_URL + '?action=get_one&ma=' + encodeURIComponent(maVatTu) + '&t=' + ts, { cache: 'no-store' })
                ]);

                if (!resNhom.ok || !resDvt.ok || !resVatTu.ok) throw new Error('Server lỗi khi tải dữ liệu.');

                const [jsonNhom, jsonDvt, jsonVatTu] = await Promise.all([
                    resNhom.json(), resDvt.json(), resVatTu.json()
                ]);

                if (jsonVatTu.status !== 'success') {
                    showLoadError('Không tìm thấy vật tư "' + maVatTu + '".');
                    return;
                }

                buildDropdown('Ma_Nhom_Vat_Tu', jsonNhom.data || [], 'Ma_Nhom_Vat_Tu', 'Ten_Nhom_Vat_Tu');
                buildDropdown('Ma_DVT_Co_Ban',  jsonDvt.data  || [], 'Ma_DVT',          'Ten_DVT');
                fillForm(jsonVatTu.data);

                document.getElementById('skeleton').classList.add('hidden');
                document.getElementById('form-card').classList.remove('hidden');

            } catch (err) {
                showLoadError('Lỗi kết nối: ' + err.message);
            }
        }

        function buildDropdown(selectId, items, valKey, labelKey) {
            const sel = document.getElementById(selectId);
            sel.innerHTML = '';
            items.forEach(function(item) {
                const opt = document.createElement('option');
                opt.value = item[valKey];
                opt.textContent = item[labelKey];
                sel.appendChild(opt);
            });
        }

        function fillForm(vt) {
            document.getElementById('Ma_Vat_Tu').value     = vt.Ma_Vat_Tu;
            document.getElementById('Ten_Vat_Tu').value    = vt.Ten_Vat_Tu;
            document.getElementById('Ma_Nhom_Vat_Tu').value = vt.Ma_Nhom_Vat_Tu;
            document.getElementById('Ma_DVT_Co_Ban').value  = vt.Ma_DVT_Co_Ban;
            document.getElementById('Quy_Cach').value       = vt.Quy_Cach       || '';
            document.getElementById('Do_Day').value         = vt.Do_Day         || '';
            document.getElementById('Vi_Tri_Luu_Kho').value = vt.Vi_Tri_Luu_Kho || '';
            document.getElementById('Dinh_Muc_Ton').value   = vt.Dinh_Muc_Ton   || 0;
            document.getElementById('label-ma').textContent = vt.Ma_Vat_Tu;

           
        }

        // ── Submit ───────────────────────────────────────────────────────────
        document.getElementById('form-sua-vat-tu').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();

            const get = id => document.getElementById(id).value.trim();

            const data = {
                Ten_Vat_Tu:     get('Ten_Vat_Tu'),
                Ma_Nhom_Vat_Tu: get('Ma_Nhom_Vat_Tu'),
                Ma_DVT_Co_Ban:  get('Ma_DVT_Co_Ban'),
                Quy_Cach:       get('Quy_Cach'),
                Do_Day:         get('Do_Day'),
                Vi_Tri_Luu_Kho: get('Vi_Tri_Luu_Kho'),
                Dinh_Muc_Ton:   parseInt(document.getElementById('Dinh_Muc_Ton').value) || 0
            };

            if (!data.Ten_Vat_Tu)     return showError('Tên vật tư không được để trống.');
            if (!data.Ma_Nhom_Vat_Tu) return showError('Vui lòng chọn nhóm vật tư.');
            if (!data.Ma_DVT_Co_Ban)  return showError('Vui lòng chọn đơn vị tính.');

            setLoading(true);

            try {
                const res = await fetch(API_URL + '?ma=' + encodeURIComponent(maVatTu), {
                    method:  'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(data),
                    cache:   'no-store'
                });

                const json = await res.json();

                if (json.status === 'success') {
                    Navigation.navigateTo('materials');
                } else {
                    showError(json.message || 'Cập nhật thất bại.');
                }
            } catch (err) {
                showError('Lỗi kết nối: ' + err.message);
            } finally {
                setLoading(false);
            }
        });

        // ── Helpers ──────────────────────────────────────────────────────────
        function showError(msg) {
            const box = document.getElementById('form-error');
            document.getElementById('form-error-msg').textContent = msg;
            box.classList.remove('hidden');
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideError() {
            document.getElementById('form-error').classList.add('hidden');
        }

        function setLoading(state) {
            const btn = document.getElementById('btn-submit');
            btn.disabled = state;
            document.getElementById('btn-icon').className = state ? 'fas fa-spinner fa-spin' : 'fas fa-save';
            document.getElementById('btn-text').textContent = state ? 'Đang lưu...' : 'Lưu thay đổi';
        }

        function showLoadError(msg) {
            document.getElementById('skeleton').classList.add('hidden');
            document.getElementById('load-error-msg').textContent = msg;
            document.getElementById('load-error').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
