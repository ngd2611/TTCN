<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục vật tư - Hệ thống quản lý kho Trường Thọ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F4F7F9; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-[#F4F7F9] text-slate-800">

    <!-- Page Content -->
    <div class="p-6">
        
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Danh mục vật tư</h2>
                <p class="text-sm text-slate-500 mt-1">Quản lý toàn bộ thông tin hàng hóa, vật tư trong hệ thống.</p>
            </div>
            <div class="flex space-x-3">
                <div class="relative">
                    <select id="f-nhom" class="bg-white border border-slate-200 text-slate-600 text-sm rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                        <option>Tất cả nhóm vật tư</option>
                        <option>Tấm thạch cao</option>
                        <option>Hệ khung xương</option>
                        <option>Vật liệu mới</option>
                        <option>Tấm trần nhựa</option>
                    </select>
                </div>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                    <input id="f-search" type="text" placeholder="Tìm mã, tên vật tư..." class="bg-white border border-slate-200 text-slate-600 text-sm rounded-lg pl-9 pr-4 py-2 focus:outline-none focus:border-blue-500 w-56">
                </div>
                <button id="f-reset" class="text-slate-400 hover:text-blue-600 transition-colors px-2" title="Xóa bộ lọc"><i class="fas fa-times-circle"></i></button>
                <button class="bg-[#2563EB] hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium flex items-center shadow-sm transition-colors" data-nav="addMaterial">
                    <i class="fas fa-plus mr-2"></i> Thêm vật tư
                </button>
            </div>
        </div>

        <!-- Bảng Dữ liệu -->
        <!-- Counter -->
        <div class="px-1 pb-2 text-[12px] text-slate-500" id="f-counter"></div>
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Mã VT</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Tên vật tư</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Nhóm vật tư</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Quy cách</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">ĐVT</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Tồn thực tế</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100" id="vattu-tbody">
                </tbody>
            </table>
            
            <!-- Pagination -->
            <div class="p-4 border-t border-slate-200 flex justify-between items-center bg-white">
                <span class="text-sm text-slate-500">Hiển thị 1 đến 10 của 124 vật tư</span>
                <div class="flex space-x-1">
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">Trước</button>
                    <button class="px-3 py-1.5 border border-blue-600 bg-blue-50 rounded-md text-sm text-blue-600 font-medium">1</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">2</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">3</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50">Sau</button>
                </div>
            </div>
        </div>

    </div>

    <script src="../../assets/js/mock_data.js"></script>
    <script src="../../assets/js/filter.js"></script>
    <script src="../../assets/js/navigation.js"></script>
    <script>
        (function () {
            const list = JSON.parse(localStorage.getItem('ttcn_vattu') || '[]');
            const tbody = document.getElementById('vattu-tbody');
            tbody.innerHTML = list.map(v => {
                const tonHtml = v.ton <= 50
                    ? `<span class="text-sm font-semibold text-red-500">${v.ton.toLocaleString('vi-VN')}</span><span class="block text-[10px] text-red-400 mt-0.5">Dưới định mức</span>`
                    : `<span class="text-sm font-semibold text-slate-800">${v.ton.toLocaleString('vi-VN')}</span>`;
                return `<tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-sm font-semibold text-blue-600">${v.ma}</td>
                    <td class="p-4 text-sm font-medium text-slate-800">${v.ten}</td>
                    <td class="p-4 text-sm text-slate-500">${v.nhom}</td>
                    <td class="p-4 text-sm text-slate-500">${v.quyCach || ''}</td>
                    <td class="p-4 text-center"><span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200">${v.dvt}</span></td>
                    <td class="p-4 text-right">${tonHtml}</td>
                    <td class="p-4 text-center space-x-2">
                        <button class="w-8 h-8 rounded-lg text-slate-400 hover:bg-blue-50 hover:text-blue-600 transition-colors"><i class="fas fa-pen"></i></button>
                        <button class="w-8 h-8 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-600 transition-colors" onclick="xoaVatTu('${v.ma}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');

            window.xoaVatTu = function(ma) {
                if (!confirm('Xóa vật tư ' + ma + '?')) return;
                const arr = JSON.parse(localStorage.getItem('ttcn_vattu') || '[]').filter(x => x.ma !== ma);
                localStorage.setItem('ttcn_vattu', JSON.stringify(arr));
                location.reload();
            };

            FilterEngine.init({
                tableBodyId: 'vattu-tbody',
                searchId: 'f-search',
                counterId: 'f-counter',
                resetId: 'f-reset',
                searchCols: [0, 1, 2, 3]
            });

            // Filter nhóm riêng
            document.getElementById('f-nhom').addEventListener('change', function () {
                const val = this.value;
                document.querySelectorAll('#vattu-tbody tr:not(.filter-empty-row)').forEach(row => {
                    if (val === 'Tất cả nhóm vật tư') { row.style.display = ''; return; }
                    const nhom = row.cells[2] ? row.cells[2].textContent.trim() : '';
                    row.style.display = nhom === val ? '' : 'none';
                });
            });
        })();
    </script>
</body>
</html>
