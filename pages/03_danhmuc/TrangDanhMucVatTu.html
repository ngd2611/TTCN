<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Danh mục vật tư - Hệ thống quản lý kho Trường Thọ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body class="bg-[#F4F7F9] text-slate-800">

    <div class="p-6">

        <!-- Header -->
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Danh mục vật tư</h2>
                <p class="text-sm text-slate-500 mt-1">Quản lý toàn bộ thông tin hàng hóa, vật tư trong hệ thống.</p>
            </div>
            <div class="flex space-x-3">
                <input id="search-ma" type="text" placeholder="Tìm kiếm mã vật tư..." class="bg-white border border-slate-200 text-slate-600 text-sm rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 w-48">
                <select id="filter-nhom" class="bg-white border border-slate-200 text-slate-600 text-sm rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                    <option value="">Tất cả nhóm vật tư</option>
                </select>
                <button class="bg-[#2563EB] hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium flex items-center shadow-sm transition-colors" data-nav="addMaterial">
                    <i class="fas fa-plus mr-2"></i> Thêm vật tư
                </button>
            </div>
        </div>

        <!-- Bảng Dữ liệu -->
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider w-10">STT</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Mã vật tư</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Tên vật tư</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Nhóm</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">ĐVT</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Quy cách</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">Độ dày</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Vị trí lưu kho</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">SL Tồn</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">SL Hỏng/Vỡ</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="vattu-list" class="divide-y divide-slate-100">
                        <tr id="row-loading">
                            <td colspan="11" class="p-10 text-center text-sm text-slate-400">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Đang tải dữ liệu...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="p-4 border-t border-slate-200 flex justify-between items-center bg-white">
                <span id="pagination-info" class="text-sm text-slate-500">—</span>
                <div id="pagination-controls" class="flex space-x-1"></div>
            </div>
        </div>

    </div>

    <!-- Modal Xác nhận Xóa -->
    <div id="modal-delete" class="fixed inset-0 z-50 hidden items-center justify-center" style="display:none">
        <div class="absolute inset-0 bg-black/40" onclick="closeDeleteModal()"></div>
        <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 p-6">
            <div class="flex items-start space-x-4">
                <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-exclamation-triangle text-red-600"></i>
                </div>
                <div class="flex-1">
                    <h3 class="text-base font-semibold text-slate-800">Xóa vật tư</h3>
                    <p class="text-sm text-slate-500 mt-1">Bạn có chắc muốn xóa vật tư này không?</p>
                    <p class="text-sm font-medium text-slate-700 mt-2 bg-slate-50 px-3 py-2 rounded-lg" id="modal-delete-name"></p>
                    <p class="text-xs text-red-500 mt-2">Hành động này không thể hoàn tác.</p>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="closeDeleteModal()" class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                    Hủy
                </button>
                <button id="btn-confirm-delete" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors flex items-center space-x-2">
                    <i class="fas fa-trash text-xs"></i>
                    <span>Xóa</span>
                </button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/navigation.js?v=3"></script>

    <script>
        // ── API URL ──────────────────────────────────────────────────────────
        const API_URL = window.location.origin.includes('localhost')
            ? 'http://localhost/TTCN/backend/controllers/VatTuController.php'
            : window.location.origin + '/TTCN/backend/controllers/VatTuController.php';
        const PAGE_SIZE = 10;

        let allData      = [];
        let filteredData = [];
        let currentPage  = 1;

        // ── Fetch danh sách ──────────────────────────────────────────────────
        async function fetchVatTu() {
            try {
                const res  = await fetch(API_URL + '?t=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                if (json.status !== 'success') throw new Error(json.message || 'API lỗi');

                allData      = json.data || [];
                filteredData = [...allData];
                buildNhomFilter();
                renderPage(1);
            } catch (err) {
                document.getElementById('vattu-list').innerHTML =
                    '<tr><td colspan="11" class="p-10 text-center text-sm text-red-500">' +
                    '<i class="fas fa-exclamation-circle mr-2"></i>Không thể tải dữ liệu: ' + err.message + '</td></tr>';
            }
        }

        // ── Filter nhóm ──────────────────────────────────────────────────────
        function buildNhomFilter() {
            const select = document.getElementById('filter-nhom');
            const nhoms  = [...new Set(allData.map(vt => vt.Ten_Nhom_Vat_Tu).filter(Boolean))];
            nhoms.forEach(nhom => {
                const opt = document.createElement('option');
                opt.value = nhom;
                opt.textContent = nhom;
                select.appendChild(opt);
            });
            select.addEventListener('change', function () {
                applyFilters();
            });
        }

        // ── Filter search mã vật tư ──────────────────────────────────────────
        function applyFilters() {
            const nhomValue = document.getElementById('filter-nhom').value;
            const searchMa  = document.getElementById('search-ma').value.toLowerCase();

            filteredData = allData.filter(vt => {
                const matchNhom = !nhomValue || vt.Ten_Nhom_Vat_Tu === nhomValue;
                const matchMa   = !searchMa || vt.Ma_Vat_Tu.toLowerCase().includes(searchMa);
                return matchNhom && matchMa;
            });
            renderPage(1);
        }

        document.getElementById('search-ma').addEventListener('input', applyFilters);

        // ── Render bảng ──────────────────────────────────────────────────────
        function renderPage(page) {
            currentPage    = page;
            const start    = (page - 1) * PAGE_SIZE;
            const pageData = filteredData.slice(start, start + PAGE_SIZE);
            const tbody    = document.getElementById('vattu-list');

            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="p-10 text-center text-sm text-slate-400">' +
                    '<i class="fas fa-box-open mr-2"></i>Không có vật tư nào.</td></tr>';
                updatePagination();
                return;
            }

            tbody.innerHTML = pageData.map(function (vt, idx) {
                const stt         = start + idx + 1;
                const ton         = parseInt(vt.So_Luong_Ton)    || 0;
                const dinhMuc     = parseInt(vt.Dinh_Muc_Ton)    || 0;
                const hong        = parseInt(vt.So_Luong_Hong_Vo) || 0;
                const duoiDinhMuc = ton < dinhMuc;
                const rowClass    = duoiDinhMuc ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-slate-50';

                const slTon = duoiDinhMuc
                    ? '<span class="font-semibold text-red-500">' + ton.toLocaleString('vi-VN') + '</span>' +
                      '<span class="block text-[10px] text-red-400 leading-tight">Dưới định mức</span>'
                    : '<span class="font-semibold text-slate-800">' + ton.toLocaleString('vi-VN') + '</span>';

                const slHong = hong > 0
                    ? '<span class="font-semibold text-orange-500">' + hong.toLocaleString('vi-VN') + '</span>'
                    : '<span class="text-slate-400">0</span>';

                const tenEsc = vt.Ten_Vat_Tu.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                const maEsc  = vt.Ma_Vat_Tu.replace(/'/g, "\\'");

                return '<tr class="' + rowClass + ' transition-colors">' +
                    '<td class="p-4 text-xs text-slate-400 text-center">' + stt + '</td>' +
                    '<td class="p-4 text-sm font-semibold text-blue-600">' + vt.Ma_Vat_Tu + '</td>' +
                    '<td class="p-4 text-sm font-medium text-slate-800">' + vt.Ten_Vat_Tu + '</td>' +
                    '<td class="p-4 text-sm text-slate-500">' + (vt.Ten_Nhom_Vat_Tu || '—') + '</td>' +
                    '<td class="p-4 text-center"><span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200">' + (vt.Ten_DVT || '—') + '</span></td>' +
                    '<td class="p-4 text-sm text-slate-500">' + (vt.Quy_Cach || '—') + '</td>' +
                    '<td class="p-4 text-sm text-slate-500 text-center">' + (vt.Do_Day || '—') + '</td>' +
                    '<td class="p-4 text-sm text-slate-500">' + (vt.Vi_Tri_Luu_Kho || '—') + '</td>' +
                    '<td class="p-4 text-right">' + slTon + '</td>' +
                    '<td class="p-4 text-right">' + slHong + '</td>' +
                    '<td class="p-4 text-center">' +
                        '<div class="flex items-center justify-center space-x-1">' +
                            '<button onclick="editVatTu(\'' + maEsc + '\')" class="w-8 h-8 rounded-lg text-slate-400 hover:bg-blue-50 hover:text-blue-600 transition-colors" title="Sửa"><i class="fas fa-pen text-xs"></i></button>' +
                            '<button onclick="deleteVatTu(\'' + maEsc + '\', \'' + tenEsc + '\')" class="w-8 h-8 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-600 transition-colors" title="Xóa"><i class="fas fa-trash text-xs"></i></button>' +
                        '</div>' +
                    '</td>' +
                '</tr>';
            }).join('');

            updatePagination();
        }

        // ── Pagination ───────────────────────────────────────────────────────
        function updatePagination() {
            const total      = filteredData.length;
            const totalPages = Math.ceil(total / PAGE_SIZE);
            const start      = total === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;
            const end        = Math.min(currentPage * PAGE_SIZE, total);

            document.getElementById('pagination-info').textContent =
                'Hiển thị ' + start + '–' + end + ' trong tổng số ' + total + ' vật tư';

            const controls = document.getElementById('pagination-controls');
            if (totalPages <= 1) { controls.innerHTML = ''; return; }

            let html = '<button onclick="renderPage(' + (currentPage - 1) + ')" ' +
                (currentPage === 1 ? 'disabled ' : '') +
                'class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed">Trước</button>';

            for (let p = 1; p <= totalPages; p++) {
                const cls = p === currentPage
                    ? 'border-blue-600 bg-blue-50 text-blue-600 font-medium'
                    : 'border-slate-200 text-slate-500 hover:bg-slate-50';
                html += '<button onclick="renderPage(' + p + ')" class="px-3 py-1.5 border rounded-md text-sm ' + cls + '">' + p + '</button>';
            }

            html += '<button onclick="renderPage(' + (currentPage + 1) + ')" ' +
                (currentPage === totalPages ? 'disabled ' : '') +
                'class="px-3 py-1.5 border border-slate-200 rounded-md text-sm text-slate-500 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed">Sau</button>';

            controls.innerHTML = html;
        }

        // ── Handlers edit ────────────────────────────────────────────────────
        function editVatTu(maVatTu) {
            Navigation.navigateToUrl('pages/03_danhmuc/SuaVatTu.html?ma=' + encodeURIComponent(maVatTu));
        }

        // ── Modal xóa ────────────────────────────────────────────────────────
        let pendingDeleteMa = null;

        function deleteVatTu(maVatTu, tenVatTu) {
            pendingDeleteMa = maVatTu;
            document.getElementById('modal-delete-name').textContent = tenVatTu + '  (' + maVatTu + ')';
            document.getElementById('modal-delete').style.display = 'flex';
        }

        function closeDeleteModal() {
            pendingDeleteMa = null;
            document.getElementById('modal-delete').style.display = 'none';
        }

        document.getElementById('btn-confirm-delete').addEventListener('click', async function () {
            if (!pendingDeleteMa) return;

            const ma  = pendingDeleteMa;
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i><span class="ml-1">Đang xóa...</span>';

            try {
                const res  = await fetch(API_URL + '?ma=' + encodeURIComponent(ma), {
                    method: 'DELETE',
                    cache:  'no-store'
                });
                const json = await res.json();

                closeDeleteModal();

                if (json.status === 'success') {
                    allData      = allData.filter(vt => vt.Ma_Vat_Tu !== ma);
                    filteredData = filteredData.filter(vt => vt.Ma_Vat_Tu !== ma);
                    const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
                    if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                    renderPage(currentPage);
                    showToast('Đã xóa vật tư thành công.', 'success');
                } else {
                    showToast(json.message || 'Xóa thất bại.', 'error');
                }
            } catch (err) {
                closeDeleteModal();
                showToast('Lỗi kết nối. Vui lòng thử lại.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-trash text-xs"></i><span class="ml-1">Xóa</span>';
            }
        });

        // ── Toast ────────────────────────────────────────────────────────────
        function showToast(msg, type) {
            const el = document.createElement('div');
            el.className = 'fixed bottom-6 right-6 z-50 flex items-center space-x-2 px-4 py-3 rounded-lg shadow-lg text-sm font-medium transition-opacity ' +
                (type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white');
            el.innerHTML = '<i class="fas ' + (type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle') + '"></i>' +
                           '<span class="ml-2">' + msg + '</span>';
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
        }

        // ── Khởi chạy ────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', fetchVatTu);
    </script>

</body>
</html>
