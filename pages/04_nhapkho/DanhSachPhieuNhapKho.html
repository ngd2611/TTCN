<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Phiếu nhập kho - He thong quan ly kho Truong Tho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body class="flex h-screen text-slate-800 overflow-hidden">
    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Page Content -->
        <div class="flex-1 overflow-y-auto p-6 bg-[#F4F7F9]">
            <!-- Submenu Tabs -->
            <div class="mb-5 border-b border-slate-200">
                <nav class="flex space-x-1">
                    <a href="DanhSachPhieuNhapKho.html" class="px-4 py-2.5 text-sm font-semibold text-blue-600 border-b-2 border-blue-600">
                        <i class="fas fa-list mr-2"></i>Danh sách phiếu nhập
                    </a>
                    <a href="TrangDSDeXuatNhapHang.html" class="px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent hover:border-slate-300 transition-colors">
                        <i class="fas fa-file-invoice mr-2"></i>Đề xuất nhập hàng
                    </a>
                    <a href="DanhSachBienBanHangLoi.html" class="px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent hover:border-slate-300 transition-colors">
                        <i class="fas fa-exclamation-triangle mr-2"></i>Biên bản hàng lỗi
                    </a>
                </nav>
            </div>
<!-- Page Title + Actions -->
            <div class="flex items-start justify-between mb-5">
                <div>
                    <h2 class="text-[20px] font-bold text-slate-800 leading-tight">Danh sách Phiếu nhập kho</h2>
                    <p class="text-[13px] text-slate-500 mt-0.5">Quản lý các phiếu nhập kho đã được tạo và trạng thái nhập hàng.</p>
                </div>
                <div class="flex items-center space-x-2">
                    <button class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-[13px] font-semibold transition-colors flex items-center">
                        <i class="fas fa-file-excel mr-2 text-emerald-600"></i> Xuất Excel
                    </button>
                    <button class="bg-[#2563EB] hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-[13px] font-semibold flex items-center shadow-sm transition-colors" data-nav="createImport">
                        <i class="fas fa-plus mr-2"></i> Tạo phiếu nhập
                    </button>
                </div>
            </div>

            <!-- Bộ lọc -->
            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                <!-- Filter Bar -->
                <div class="p-4 border-b border-slate-100 flex flex-wrap items-center gap-3">
                    <div class="relative flex-1 min-w-[220px]">
                        <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-[12px]"></i>
                        <input id="f-search" type="text" placeholder="Tìm mã phiếu, nhà cung cấp, chứng từ..." class="w-full bg-slate-50 border border-slate-200 rounded-md pl-8 pr-3 py-1.5 text-[13px] outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>

                    <div class="relative min-w-[170px]">
                        <select id="f-status" class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5 text-[13px] font-medium text-slate-700 outline-none focus:border-blue-500 pr-8">
                            <option>Tất cả trạng thái</option>
                            <option>Đã nhập kho</option>
                            <option>Chờ nhập hàng</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-3 top-2.5 text-slate-400 text-[11px] pointer-events-none"></i>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="flex items-center bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5">
                            <input id="f-from" type="date" class="bg-transparent outline-none text-[13px] text-slate-500 w-[130px]">
                        </div>
                        <span class="text-slate-400 text-[12px]">—</span>
                        <div class="flex items-center bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5">
                            <input id="f-to" type="date" class="bg-transparent outline-none text-[13px] text-slate-500 w-[130px]">
                        </div>
                        <button id="f-reset" class="text-[12px] text-slate-400 hover:text-blue-600 transition-colors px-2" title="Xóa bộ lọc"><i class="fas fa-times-circle"></i></button>
                    </div>
                </div>
                <!-- Counter -->
                <div class="px-4 py-2 bg-slate-50/60 border-b border-slate-100 text-[12px] text-slate-500" id="f-counter"></div>

                <!-- Table -->
                <div class="overflow-x-auto">
                    <table class="w-full text-[13px] text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 bg-white">
                                <th class="py-3 px-5 font-bold text-slate-500 uppercase text-[11px]">Mã phiếu nhập</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px]">Ngày nhập</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px]">Nhà cung cấp</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px]">Chứng từ gốc</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px] text-center">Trạng thái</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px] text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="pnk-tbody">
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="px-5 py-3 border-t border-slate-200 bg-slate-50/50 flex items-center justify-between">
                    <p class="text-[12px] text-slate-500 font-medium">Hiển thị 1 - 10 trên tổng 45 phiếu nhập</p>
                    <div class="flex items-center space-x-1">
                        <button class="px-3 py-1 text-[12px] font-semibold text-slate-400 hover:text-slate-600 transition-colors">Trước</button>
                        <button class="w-7 h-7 rounded-md bg-[#2563EB] text-white text-[12px] font-bold flex items-center justify-center">1</button>
                        <button class="w-7 h-7 rounded-md hover:bg-slate-100 text-slate-600 text-[12px] font-semibold flex items-center justify-center transition-colors">2</button>
                        <button class="w-7 h-7 rounded-md hover:bg-slate-100 text-slate-600 text-[12px] font-semibold flex items-center justify-center transition-colors">3</button>
                        <button class="px-3 py-1 text-[12px] font-semibold text-slate-600 hover:text-slate-800 transition-colors">Sau</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Load Core Scripts -->
    <script src="../../assets/js/mock_data.js"></script>
    <script src="../../assets/js/filter.js"></script>
    <script src="../../assets/js/navigation.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        (function () {
            const list = JSON.parse(localStorage.getItem('ttcn_phieu_nhap') || '[]');
            const tbody = document.getElementById('pnk-tbody');
            tbody.innerHTML = list.map(p => {
                const badge = p.trangThai === 'nhap'
                    ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200"><i class="fas fa-check-circle text-[10px]"></i> Đã nhập kho</span>`
                    : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-amber-50 text-amber-700 border border-amber-200"><i class="fas fa-truck text-[10px]"></i> Chờ nhập hàng</span>`;
                return `<tr class="hover:bg-slate-50 transition-colors">
                    <td class="py-3 px-5"><a href="#" class="font-semibold text-blue-600 hover:underline">${p.ma}</a></td>
                    <td class="py-3 px-4 text-slate-600">${p.ngay}</td>
                    <td class="py-3 px-4 font-medium text-slate-800">${p.nhaCungCap}</td>
                    <td class="py-3 px-4"><a href="#" class="font-semibold text-blue-600 hover:underline">${p.chungTu}</a></td>
                    <td class="py-3 px-4 text-center">${badge}</td>
                    <td class="py-3 px-4 text-center"><div class="flex items-center justify-center space-x-1.5">
                        <button class="w-7 h-7 rounded-md bg-blue-50 hover:bg-blue-100 text-blue-600 flex items-center justify-center"><i class="fas fa-eye text-[12px]"></i></button>
                        <button class="w-7 h-7 rounded-md bg-slate-50 hover:bg-slate-100 text-slate-500 flex items-center justify-center"><i class="fas fa-print text-[12px]"></i></button>
                    </div></td>
                </tr>`;
            }).join('');

            FilterEngine.init({
                tableBodyId: 'pnk-tbody',
                searchId: 'f-search',
                statusId: 'f-status',
                dateFromId: 'f-from',
                dateToId: 'f-to',
                counterId: 'f-counter',
                resetId: 'f-reset',
                searchCols: [0, 2, 3],
                dateCol: 1
            });
        })();
    </script>
</body>
</html>
