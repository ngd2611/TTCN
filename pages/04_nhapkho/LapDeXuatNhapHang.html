<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập đề xuất nhập hàng - He thong quan ly kho Truong Tho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body class="flex h-screen text-slate-800 overflow-hidden">
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <div class="flex-1 overflow-y-auto p-6 bg-[#F4F7F9]">

            <!-- Page Title -->
            <div class="flex items-center mb-5">
                <button data-nav="importProposalList" class="w-8 h-8 rounded-lg bg-white border border-slate-200 hover:bg-slate-50 flex items-center justify-center mr-4 transition-colors shadow-sm">
                    <i class="fas fa-arrow-left text-slate-500 text-[13px]"></i>
                </button>
                <div>
                    <h2 class="text-[20px] font-bold text-slate-800 leading-tight">Lập đề xuất nhập hàng</h2>
                    <p class="text-[13px] text-slate-500 mt-0.5">Vui lòng chọn nhà cung cấp và danh sách vật tư cần nhập kho.</p>
                </div>
            </div>

            <!-- Two-column layout -->
            <div class="flex gap-5 items-start">

                <!-- LEFT: Thông tin chung -->
                <div class="w-[290px] shrink-0 bg-white border border-slate-200 rounded-xl shadow-sm p-5">
                    <h3 class="text-[14px] font-bold text-slate-700 mb-4">Thông tin chung</h3>

                    <!-- Mã đề xuất (auto) -->
                    <div class="mb-4">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Mã đề xuất</label>
                        <input type="text" id="ma-de-xuat" readonly
                            class="w-full bg-slate-50 border border-slate-200 rounded-md px-3 py-2 text-[13px] font-semibold text-slate-600 outline-none cursor-not-allowed">
                    </div>

                    <!-- Nhà cung cấp -->
                    <div class="mb-4">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">
                            Nhà cung cấp / Kho xuất <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <select id="select-ncc" class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-md px-3 py-2 text-[13px] text-slate-700 outline-none focus:border-blue-500 focus:bg-white transition-colors pr-8">
                                <option value="" disabled selected>-- Chọn nhà cung cấp --</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-3 top-3 text-slate-400 text-[11px] pointer-events-none"></i>
                        </div>
                    </div>

                    <!-- Loại nhập kho / Lý do -->
                    <div class="mb-4">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">
                            Lý do đề xuất <span class="text-red-500">*</span>
                        </label>
                        <textarea id="ly-do" placeholder="Nhập mua mới, bổ sung tồn kho, ..." rows="4"
                            class="w-full bg-slate-50 border border-slate-200 rounded-md px-3 py-2 text-[13px] text-slate-700 placeholder-slate-400 outline-none focus:border-blue-500 focus:bg-white transition-colors resize-none"></textarea>
                    </div>

                    <!-- Ngày cần hàng -->
                    <div class="mb-2">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">
                            Ngày cần hàng <span class="text-red-500">*</span>
                        </label>
                        <input type="date" id="ngay-can-hang"
                            class="w-full bg-slate-50 border border-slate-200 rounded-md px-3 py-2 text-[13px] text-slate-700 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>
                </div>

                <!-- RIGHT: Danh sách vật tư đề xuất -->
                <div class="flex-1 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                    <!-- Table Header -->
                    <div class="px-5 py-3.5 border-b border-slate-200 flex items-center justify-between bg-slate-50/50">
                        <h3 class="text-[13px] font-bold text-slate-500 uppercase tracking-wider">Danh sách vật tư đề xuất</h3>
                        <button id="btn-them-vat-tu" class="flex items-center text-[13px] font-semibold text-blue-600 hover:text-blue-700 transition-colors">
                            <i class="fas fa-plus mr-1.5 text-[11px]"></i> Thêm vật tư
                        </button>
                    </div>

                    <!-- Table -->
                    <table class="w-full text-[13px] text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 bg-white">
                                <th class="py-3 px-5 font-bold text-slate-500 uppercase text-[11px] w-[170px]">Vật tư</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px]">Tên vật tư</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px] w-[80px]">ĐVT</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px] text-center w-[120px]">Số lượng</th>
                                <th class="py-3 px-4 font-bold text-slate-500 uppercase text-[11px] text-center w-[60px]">Xóa</th>
                            </tr>
                        </thead>
                        <tbody id="vattu-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>

                    <!-- Empty row hint -->
                    <div id="vattu-empty" class="py-10 text-center text-slate-400 text-[13px]">
                        <i class="fas fa-box-open text-2xl mb-2 text-slate-300"></i><br>
                        Chưa có vật tư. Bấm "Thêm vật tư" để bắt đầu.
                    </div>

                    <!-- Action Buttons -->
                    <div class="px-5 py-4 border-t border-slate-200 flex justify-end space-x-3">
                        <button id="btn-huy" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-2 rounded-lg text-[13px] font-semibold transition-colors">
                            Hủy bỏ
                        </button>
                        <button id="btn-gui-de-xuat" class="bg-[#2563EB] hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-[13px] font-semibold flex items-center shadow-sm transition-colors">
                            <i class="fas fa-paper-plane mr-2 text-[12px]"></i> Gửi đề xuất phê duyệt
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../../assets/js/mock_data.js"></script>
    <script src="../../assets/js/navigation.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        // ===== KHỞI TẠO =====
        const vatTuList = DB.get('ttcn_vat_tu');
        const nccList   = DB.get('ttcn_nha_cung_cap');

        // Sinh mã tự động
        document.getElementById('ma-de-xuat').value = generateCode('DXN', DB.get('ttcn_de_xuat'), 'Ma_De_Xuat');

        // Load nhà cung cấp vào select
        const selNCC = document.getElementById('select-ncc');
        nccList.forEach(ncc => {
            const opt = document.createElement('option');
            opt.value = ncc.Ma_NCC;
            opt.textContent = ncc.Ten_NCC;
            opt.dataset.ten = ncc.Ten_NCC;
            selNCC.appendChild(opt);
        });

        // ===== THÊM DÒNG VẬT TƯ =====
        function taoRowVatTu(index) {
            // Options vật tư
            const opts = vatTuList.map(v =>
                `<option value="${v.Ma_Vat_Tu}" data-ten="${v.Ten_Vat_Tu}" data-dvt="${v.Ten_DVT}">${v.Ma_Vat_Tu} — ${v.Ten_Vat_Tu}</option>`
            ).join('');

            return `
            <tr id="row-${index}" class="hover:bg-slate-50 transition-colors">
                <td class="py-2 px-5">
                    <select onchange="onChonVatTu(this, ${index})"
                        class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-md px-2 py-1.5 text-[13px] text-slate-700 outline-none focus:border-blue-500 pr-6">
                        <option value="" disabled selected>-- Chọn --</option>
                        ${opts}
                    </select>
                </td>
                <td class="py-2 px-4 text-slate-700" id="ten-${index}"><span class="text-slate-400 italic">—</span></td>
                <td class="py-2 px-4 text-slate-600" id="dvt-${index}"><span class="text-slate-400 italic">—</span></td>
                <td class="py-2 px-4 text-center">
                    <input type="number" id="sl-${index}" value="1" min="1"
                        class="w-20 text-center bg-slate-50 border border-slate-200 rounded-md px-2 py-1 text-[13px] font-semibold text-slate-800 outline-none focus:border-blue-500 transition-colors">
                </td>
                <td class="py-2 px-4 text-center">
                    <button class="text-red-400 hover:text-red-600 transition-colors" onclick="removeRow(this)">
                        <i class="fas fa-times text-sm"></i>
                    </button>
                </td>
            </tr>`;
        }

        let rowCount = 0;

        function themDongVatTu() {
            const tbody = document.getElementById('vattu-table-body');
            const empty = document.getElementById('vattu-empty');
            tbody.insertAdjacentHTML('beforeend', taoRowVatTu(rowCount++));
            empty.classList.add('hidden');
        }

        function onChonVatTu(sel, index) {
            const opt = sel.options[sel.selectedIndex];
            document.getElementById(`ten-${index}`).textContent = opt.dataset.ten || '—';
            document.getElementById(`dvt-${index}`).textContent = opt.dataset.dvt || '—';
        }

        function removeRow(btn) {
            const row = btn.closest('tr');
            row.remove();
            const tbody = document.getElementById('vattu-table-body');
            if (tbody.children.length === 0) {
                document.getElementById('vattu-empty').classList.remove('hidden');
            }
        }

        document.getElementById('btn-them-vat-tu').addEventListener('click', themDongVatTu);

        // ===== SUBMIT =====
        document.getElementById('btn-gui-de-xuat').addEventListener('click', function() {
            const maDX  = document.getElementById('ma-de-xuat').value;
            const maNCC = selNCC.value;
            const tenNCC = selNCC.options[selNCC.selectedIndex]?.dataset?.ten || '';
            const lyDo  = document.getElementById('ly-do').value.trim();
            const ngay  = document.getElementById('ngay-can-hang').value;

            if (!maNCC) { alert('Vui lòng chọn nhà cung cấp!'); return; }
            if (!lyDo)  { alert('Vui lòng nhập lý do đề xuất!'); return; }
            if (!ngay)  { alert('Vui lòng chọn ngày cần hàng!'); return; }

            // Thu thập vật tư
            const rows = document.querySelectorAll('#vattu-table-body tr');
            if (rows.length === 0) { alert('Vui lòng thêm ít nhất 1 vật tư!'); return; }

            const chiTietMoi = [];
            let valid = true;
            rows.forEach((row, i) => {
                const sel = row.querySelector('select');
                const slInput = row.querySelector('input[type="number"]');
                if (!sel.value) { alert(`Dòng ${i+1}: Chưa chọn vật tư!`); valid = false; return; }
                const vt = vatTuList.find(v => v.Ma_Vat_Tu === sel.value);
                chiTietMoi.push({
                    Ma_De_Xuat: maDX,
                    Ma_Vat_Tu: vt.Ma_Vat_Tu,
                    Ten_Vat_Tu: vt.Ten_Vat_Tu,
                    Ten_DVT: vt.Ten_DVT,
                    So_Luong_De_Xuat: parseInt(slInput.value) || 1,
                });
            });
            if (!valid) return;

            // Lưu đề xuất mới
            const deXuatMoi = {
                Ma_De_Xuat: maDX,
                Ma_NCC: maNCC,
                Ten_NCC: tenNCC,
                Ly_Do: lyDo,
                Ngay_Lap: new Date().toISOString(),
                Ngay_Can_Hang: ngay,
                Trang_Thai: 'Cho_Duyet',
                Nguoi_Lap: getCurrentUser(),
            };

            const dsDeXuat = DB.get('ttcn_de_xuat');
            dsDeXuat.push(deXuatMoi);
            DB.set('ttcn_de_xuat', dsDeXuat);

            const dsChiTiet = DB.get('ttcn_chi_tiet_de_xuat');
            chiTietMoi.forEach(c => dsChiTiet.push(c));
            DB.set('ttcn_chi_tiet_de_xuat', dsChiTiet);

            alert(`✅ Đã gửi đề xuất ${maDX} thành công!\nTrạng thái: Chờ phê duyệt`);
            Navigation.navigateTo('importProposalList');
        });

        document.getElementById('btn-huy').addEventListener('click', () => Navigation.navigateTo('importProposalList'));

        // Thêm 1 dòng mặc định để UX tốt hơn
        themDongVatTu();
    </script>
</body>
</html>
